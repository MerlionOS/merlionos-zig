<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Ring (Subtle) -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#F7A41D" stroke-width="2" opacity="0.3" />
  
  <!-- Stylized Merlion 'S' Curve (Lion head to Fish tail) -->
  <path d="M80 50 
           C 110 30, 150 40, 150 75 
           C 150 100, 130 115, 115 125 
           C 100 135, 90 150, 100 170 
           C 110 190, 140 185, 150 170" 
        fill="none" stroke="#F7A41D" stroke-width="15" stroke-linecap="round" />
        
  <!-- The Zig 'Z' Bolt (Integrated into the core) -->
  <path d="M85 85 L125 85 L85 125 L125 125" 
        fill="none" stroke="#F7A41D" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Lion Eye (Minimalist dot) -->
  <circle cx="125" cy="55" r="5" fill="#F7A41D" />
</svg>
