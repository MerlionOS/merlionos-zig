<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MerlionOS-Zig logo</title>
  <desc id="desc">A geometric merlion head with a sunburst mane atop a bold Z-shaped tail, blending Singapore's merlion with the Zig language brand.</desc>

  <defs>
    <linearGradient id="manegrad" x1="128" y1="14" x2="128" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFB836"/>
      <stop offset="1" stop-color="#E88A0B"/>
    </linearGradient>
    <linearGradient id="bodygrad" x1="60" y1="148" x2="196" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7A41D"/>
      <stop offset="1" stop-color="#D87F0A"/>
    </linearGradient>
  </defs>

  <!-- MANE: 9 triangular spikes radiating from face center, forming a sunburst crown -->
  <g fill="url(#manegrad)">
    <polygon points="128,14 116,62 140,62"/>
    <polygon points="86,22 100,68 122,60"/>
    <polygon points="170,22 156,68 134,60"/>
    <polygon points="48,46 76,84 100,68"/>
    <polygon points="208,46 180,84 156,68"/>
    <polygon points="22,84 60,108 76,84"/>
    <polygon points="234,84 196,108 180,84"/>
    <polygon points="20,128 60,124 60,108"/>
    <polygon points="236,128 196,124 196,108"/>
  </g>

  <!-- FACE: single bold circle in lighter cream-orange -->
  <circle cx="128" cy="92" r="42" fill="#FFD9A0" stroke="#1B2E4A" stroke-width="3"/>

  <!-- EYES: navy dots with subtle highlight -->
  <circle cx="113" cy="86" r="5" fill="#1B2E4A"/>
  <circle cx="143" cy="86" r="5" fill="#1B2E4A"/>
  <circle cx="114.5" cy="84.5" r="1.5" fill="#FFFFFF"/>
  <circle cx="144.5" cy="84.5" r="1.5" fill="#FFFFFF"/>

  <!-- NOSE: small triangular accent -->
  <path d="M124 100 L132 100 L128 106 Z" fill="#1B2E4A"/>

  <!-- MOUTH: subtle smile curve -->
  <path d="M118 112 Q128 122 138 112" stroke="#1B2E4A" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- BODY / TAIL: bold Z-shape that doubles as a fish tail and the Zig "Z" -->
  <!-- Three-segment Z with rounded miter joints for a friendly, solid feel -->
  <path d="M68 156 H188 L68 222 H188"
        fill="none"
        stroke="url(#bodygrad)"
        stroke-width="22"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- WAVE: a single thin teal wave under the Z, hinting at the sea -->
  <path d="M40 240 Q56 232 72 240 T104 240 T136 240 T168 240 T200 240 T216 240"
        fill="none"
        stroke="#1398B8"
        stroke-width="3"
        stroke-linecap="round"
        opacity="0.7"/>
</svg>
